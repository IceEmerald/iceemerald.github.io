<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play YouTube Videos</title>
</head>
<body>
    <button onclick="playVideo('VVxrH8mUWyGc')">Suara Hutan</button>
    <button onclick="playVideo('VIDEO_ID_2')">Play Video 2</button>
    <button onclick="playVideo('VIDEO_ID_3')">Play Video 3</button>

    <iframe id="youtubePlayer" width="560" height="315" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

    <script>
        function playVideo(videoId) {
            var player = document.getElementById('youtubePlayer');
            player.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1';
        }
    </script>
</body>
</html>
