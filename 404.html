<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmeraldNetwork | Not Found</title>
    <meta name="description" content="You seem to have found a page that doesn't exist. Try entering a valid URL.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.webp">
    <link rel="icon" href="/assets/images/favicon.ico" sizes="any">
</head>
<body>
        
<body>
        
        <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
            <section id="notfound">
                <div class="container hero-container" style="transform: none; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: auto; text-align: center;">
                    <div class="notfound-content"><div style="margin-top: 0;"></div>
                        
                        <div class="animate-on-scroll about-image-container">
                            <img class="show-desktop-only" src="/assets/images/404.webp" style="max-width: 700px; height: auto; opacity: 0; transform: translateY(20px); filter: blur(5px); transition: opacity 0.45s ease-out, transform 0.45s ease-out, filter 0.45s ease-out, background-color 0.2s, color 0.2s, border-color 0.2s; will-change: opacity, transform, filter;" data-ai-hint="work desk technology">
                        </div>
                        <h1 class="show-phone-only" style="color:#8D0000; text-align: center;">404</h1>
                        <p style="text-align: center;">The page you're looking for doesn't exist.</p>
                        <div style="margin-top: 5rem;"></div>
                    </div>
                </div>
            </section>
        </main>

        <div id="custom-context-menu" class="rightclick-menu">
                        <div class="context-section">
                          <span class="context-title">🔧 Tools</span>
                          <a onclick="copyTextContent()">Copy Text</a>
                          <a onclick="copyPageLink()">Copy Page Link</a>
                          <a onclick="showElementInfo()">Show Element Info</a>
                        </div>
                      </div>
                      <div id="custom-toast" class="custom-toast"></div>
        
    <script src="/assets/scripts/animationvisible.js"></script>
                             
    <script src="/assets/scripts/rightclick.js"></script>


</body></html>
