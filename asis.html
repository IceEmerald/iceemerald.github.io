<html>
<head>
  <title>Asis Mini</title>
</head>
<body>
  <h1>Asis Mini</h1>
  <button id="mldBtn">🎤 Tekan &amp; Bicara</button>
  <p id="result">...</p>

  <script>
    const mldBtn = document.getElementById("mldBtn");
    const resultText = document.getElementById("result");

    mldBtn.addEventListener("click", () => {
      resultText.textContent = "Mendengarkan...";
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "id-ID";

      recognition.onresult = async (event) => {
        const userSpeech = event.results[0][0].transcript;
        resultText.textContent = "Anda berkata: " + userSpeech;

        try {
          const response = await fetch("https://generativelanguage.googleapis.com/v1beta2/models/chat-bison-001:generateMessage?key=", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              prompt: {
                messages: [
                  { author: "user", content: userSpeech }
                ]
              }
            })
          });

          const data = await response.json();
          const aiResponse = data?.candidates?.[0]?.content || "Maaf, saya tidak bisa menjawab.";

          resultText.textContent += "\nAsis: " + aiResponse;

          const utterance = new SpeechSynthesisUtterance(aiResponse);
          utterance.lang = "id-ID";
          window.speechSynthesis.speak(utterance);
        } catch (error) {
          console.error(error);
          resultText.textContent += "\nAsis: Maaf, terjadi kesalahan teknis.";
        }
      };

      recognition.start();
    });
  </script>
</body>
</html>
