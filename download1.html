<!DOCTYPE html>
<html>
<head>
    <title>Auto Download</title>
</head>
<body>

<script>
window.onload = function() {
    const link = document.createElement('a');
    link.href = 'assets/audio/Master X7.wav'; // file to download (same folder or URL)
    link.download = 'assets/audio/Master X7.wav'; // name for download
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};
</script>

<p>If the download doesn't start automatically, <a href="assets/audio/Master X7.wav" download>click here</a>.</p>

</body>
</html>
